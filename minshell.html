<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1d1833">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Train your memory like a champion with PAO technique">
  <link rel="manifest" href="manifest.json">
  <title>Memory Crashers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background-color: #1d1833;
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: monospace;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    #loading {
      color: #f7be54;
      font-size: 16px;
      text-align: center;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    #loading.hidden { display: none; }
    canvas.emscripten {
      border: 0;
      cursor: default;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }
    #output { display: none; }

    /* Portrait hint below game */
    #rotate-hint {
      display: none;
      color: #c5c5cb;
      font-size: 12px;
      text-align: center;
      padding: 8px;
      position: fixed;
      bottom: 8px;
      left: 0; right: 0;
      z-index: 5;
    }
    @media (orientation: portrait) {
      #rotate-hint { display: block; }
    }
  </style>
</head>
<body>
  <div id="loading">Loading Memory Crashers...</div>
  <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
  <div id="rotate-hint">Rotate device for best experience</div>
  <p id="output"></p>
  <script type='text/javascript'>
    // Prevent pinch-zoom and context menu
    document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
    document.addEventListener('gestureend', function(e) { e.preventDefault(); });
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

    // Double-tap fullscreen
    var lastTap = 0;
    document.addEventListener('touchend', function(e) {
      var now = Date.now();
      if (now - lastTap < 300) {
        if (document.fullscreenElement) {
          document.exitFullscreen();
        } else {
          document.documentElement.requestFullscreen().catch(function(){});
        }
      }
      lastTap = now;
    });

    var Module = {
      print: (function() {
        var element = document.getElementById('output');
        return function(text) { element.innerHTML += text + '<br>'; };
      })(),
      canvas: (function() { return document.getElementById('canvas'); })(),
      onRuntimeInitialized: function() {
        document.getElementById('loading').classList.add('hidden');
      }
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
